{% extends 'theme/base.html' %}
{% block title %}
  Novo trabalho e trabalhadores
{% endblock %}

{% block content %}
  <div class="relative z-10 flex justify-center py-10 px-4 sm:px-6 lg:px-8">
    <div class="card w-full max-w-3xl bg-white/70 backdrop-blur-md shadow-2xl border border-gray-100">
      <div class="card-body p-6 sm:p-10">
        <div class="flex items-center gap-5 mb-8 pb-6 border-b border-gray-200/60">
          <div class="p-3 bg-neutral text-neutral-content rounded-2xl shadow-md">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 0 1 4.5 9.75h15A2.25 2.25 0 0 1 21.75 12v.75m-8.69-6.44-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v12a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9a2.25 2.25 0 0 0-2.25-2.25h-5.31c-.195 0-.382-.078-.52-.217L13.06 6.31Z" />
            </svg>
          </div>
          <div>
            <h1 class="text-2xl font-black text-gray-800 tracking-tight">Registar Trabalhos</h1>
            <p class="text-gray-500 font-medium mt-1 text-sm">
              Caixa de Referência: <span class="badge badge-neutral font-mono ml-1 shadow-sm">{{ pedido }}</span>
            </p>
          </div>
        </div>

        <form method="POST" id="workForm" class="space-y-6">
          {% csrf_token %}
          <input type="hidden" name="add_another" id="add_another" value="" />

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="form-control w-full">
              <label class="label"><span class="label-text font-bold text-gray-700">Tipo de Trabalho</span></label>
              <select name="tipo_trabalho" id="tipo_trabalho" required class="select select-bordered w-full bg-white transition-all">
                <option value="" disabled {% if not selected_work_type %}selected{% endif %}>-- Escolher --</option>
                {% for value, label in work_type_options %}
                  <option value="{{ value }}" {% if selected_work_type == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
                {% if not work_type_options %}
                  <option value="polimento">Polimento</option>
                  <option value="desbaste_agulha">Desbaste Agulha</option>
                  <option value="desbaste_calibre">Desbaste Calibre</option>
                  <option value="afinacao">Afinação</option>
                {% endif %}
              </select>
            </div>

            <div class="form-control w-full">
              <label class="label"><span class="label-text font-bold text-gray-700">Subtipo</span></label>
              <select name="subtipo" id="subtipo" multiple required class="select select-bordered w-full bg-white/50 focus:border-neutral focus:ring-neutral transition-all">
                <option value="" disabled selected>-- Escolher o tipo primeiro --</option>
              </select>
            </div>
          </div>

          <div class="form-control w-full">
            <div class="flex justify-between items-center mb-2">
              <label class="label"><span class="label-text font-bold text-gray-700">Números de Série das Fieiras</span></label>
              <div>
                <label for="select_all_dies" class="text-sm text-gray-600 cursor-pointer select-none">Selecionar Todos</label>
                <input type="checkbox" id="select_all_dies" class="checkbox checkbox-sm accent-blue-500" />
              </div>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 p-4 rounded-xl bg-gray-50/50 border border-gray-100 shadow-inner">
              {% for die in dies %}
                <label class="cursor-pointer flex items-center gap-3 bg-white border border-gray-200 rounded-lg p-3 shadow-sm hover:bg-neutral hover:text-neutral-content hover:border-neutral transition-all duration-200 group">
                  <input type="checkbox" name="serieDies" value="{{ die.id }}" class="checkbox checkbox-sm checkbox-neutral group-hover:border-white [--chkbg:white] [--chkfg:black]" />
                  <span class="label-text font-semibold text-gray-700 group-hover:text-black tracking-wide">{{ die.serial_number }}</span>
                </label>
              {% empty %}
                <div class="col-span-full py-6 text-center text-gray-500 italic flex flex-col items-center gap-2">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 opacity-50">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                  </svg>Nenhum die registrado para este QR code.
                </div>
              {% endfor %}
            </div>
          </div>

          <div class="card-actions justify-end mt-8 pt-4">
            <button type="submit" id="add_workers" class="btn btn-neutral w-full sm:w-auto px-8 shadow-lg hover:scale-[1.02] transition-transform">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
              </svg>Adicionar Trabalhos
            </button>
            <button type="button" onclick="window.location.href='{% url 'listarDies' %}'" class="btn btn-ghost w-full sm:w-auto px-8">Cancelar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tipoSelect = document.getElementById('tipo_trabalho')
      const subtipoSelect = document.getElementById('subtipo')
      const selectAllCheckbox = document.getElementById('select_all_dies')
      const dieCheckboxes = document.querySelectorAll('input[name="serieDies"][type="checkbox"]:not(#select_all_dies)')
      const initialType = tipoSelect ? tipoSelect.value : ''
    
      // Mapa de subtipos
      const subtipoMap = {
        polimento: [
          ['entrada', 'Entrada'],
          ['saida', 'Saída'],
          ['cone', 'Cone']
        ],
    
        desbaste_agulha: [
          ['entrada', 'Entrada'],
          ['saida', 'Saída'],
          ['cone', 'Cone']
        ],
        desbaste_calibre: [
          ['polimento_de_calibre', 'Polimento de Calibre'],
          ['desbaste_de_calibre', 'Desbaste de Calibre']
        ],
        afinacao: [
          ['calibre', 'Calibre'],
          ['afinacao', 'Afinação']
        ]
      }
    
      // Atualiza o subtipo quando o tipo mudar
      tipoSelect.addEventListener('change', () => {
        const tipo = tipoSelect.value
        subtipoSelect.innerHTML = '<option value="" disabled selected>-- Escolher --</option>'
    
        if (subtipoMap[tipo]) {
          subtipoMap[tipo].forEach(([value, label]) => {
            const opt = document.createElement('option')
            opt.value = value
            opt.textContent = label
            subtipoSelect.appendChild(opt)
          })
        }
      })

      if (initialType) {
        tipoSelect.dispatchEvent(new Event('change'))
      }
    
      // Funcionalidade "Selecionar Todos"
      selectAllCheckbox.addEventListener('change', () => {
        dieCheckboxes.forEach((checkbox) => {
          checkbox.checked = selectAllCheckbox.checked
        })
      })
    
      // Atualizar o checkbox "Selecionar Todos" se todos os itens forem marcados
      dieCheckboxes.forEach((checkbox) => {
        checkbox.addEventListener('change', () => {
          const allChecked = Array.from(dieCheckboxes).every((cb) => cb.checked)
          selectAllCheckbox.checked = allChecked
        })
      })
    })
  </script>
{% endblock %}
