{% extends 'theme/base.html' %}
{% block title %}
  General Report
{% endblock %}

{% block content %}
  <div class="min-h-screen bg-gray-50 p-6">
    <div class="max-w-7xl mx-auto mb-6">
      <h1 class="text-3xl font-bold text-gray-900 tracking-tight">General Report</h1>
      <p class="text-sm text-gray-500 mt-1">Statistics and production analysis</p>
    </div>

    <div class="max-w-7xl mx-auto mb-8 bg-white p-5 rounded-xl shadow-sm border border-gray-200">
      <form id="reportForm" method="POST" hx-post="{% url 'relatorio_data' %}" hx-target="#zona-da-tabela" hx-indicator="#meu-skeleton" enctype="multipart/form-data" class="flex flex-col md:flex-row items-end gap-4">
        {% csrf_token %}
        <div class="w-full md:w-auto">
          <label for="data_inicio" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Start Date</label>
          <input type="date" name="data_inicio" id="data_inicio" class="block w-full border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm px-4 py-2 text-gray-700" />
        </div>
        <div class="w-full md:w-auto">
          <label for="data_fim" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">End Date</label>
          <input type="date" name="data_fim" id="data_fim" class="block w-full border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm px-4 py-2 text-gray-700" />
        </div>
        <div class="w-full md:w-auto">
          <button type="submit" class="btn bg-blue-600 hover:bg-blue-700 text-white border-none rounded-lg shadow-sm w-full md:w-auto"><i class="fa-solid fa-filter mr-2"></i> Generate Report</button>
        </div>
      </form>
    </div>

    <div id="meu-skeleton" class="hidden max-w-7xl mx-auto mb-8 space-y-6" aria-live="polite" aria-label="Loading report">
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-4">
        <div class="skeleton h-6 w-56"></div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="skeleton h-24 w-full"></div>
          <div class="skeleton h-24 w-full"></div>
          <div class="skeleton h-24 w-full"></div>
        </div>
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-3">
        <div class="skeleton h-5 w-48"></div>
        <div class="skeleton h-4 w-full"></div>
        <div class="skeleton h-4 w-full"></div>
        <div class="skeleton h-4 w-11/12"></div>
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-3">
        <div class="skeleton h-5 w-64"></div>
        <div class="skeleton h-10 w-full"></div>
        <div class="skeleton h-10 w-full"></div>
        <div class="skeleton h-10 w-10/12"></div>
      </div>
    </div>

    <div id="zona-da-tabela">
      {% include 'theme/partials/tabela_relatorio.html' %}
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.getElementById('reportForm')
      const startInput = document.getElementById('data_inicio')
      const endInput = document.getElementById('data_fim')
      const skeleton = document.getElementById('meu-skeleton')
      const tableZone = document.getElementById('zona-da-tabela')
      const startKey = 'relatorio_data_inicio'
      const endKey = 'relatorio_data_fim'
    
      if (startInput && !startInput.value) {
        const savedStart = localStorage.getItem(startKey)
        if (savedStart) {
          startInput.value = savedStart
        }
      }
    
      if (endInput && !endInput.value) {
        const savedEnd = localStorage.getItem(endKey)
        if (savedEnd) {
          endInput.value = savedEnd
        }
      }
    
      if (form) {
        form.addEventListener('submit', function () {
          if (startInput) {
            localStorage.setItem(startKey, startInput.value || '')
          }
          if (endInput) {
            localStorage.setItem(endKey, endInput.value || '')
          }
        })
      }
    
      function formatWorkerNames() {
        const workerNames = document.querySelectorAll('.worker-name')
        workerNames.forEach(function (el) {
          const current = (el.textContent || '').trim()
          el.textContent = current.replace(/([a-z])([A-Z])/g, '$1 $2')
        })
      }
    
      formatWorkerNames()
    
      document.body.addEventListener('htmx:beforeRequest', function (event) {
        if (event.target && event.target.id === 'reportForm') {
          if (skeleton) {
            skeleton.classList.remove('hidden')
          }
          if (tableZone) {
            tableZone.classList.add('hidden')
          }
        }
      })
    
      document.body.addEventListener('htmx:afterSwap', function (event) {
        if (event.target && event.target.id === 'zona-da-tabela') {
          if (skeleton) {
            skeleton.classList.add('hidden')
          }
          if (tableZone) {
            tableZone.classList.remove('hidden')
          }
          formatWorkerNames()
        }
      })
    
      document.body.addEventListener('htmx:responseError', function () {
        if (skeleton) {
          skeleton.classList.add('hidden')
        }
        if (tableZone) {
          tableZone.classList.remove('hidden')
        }
      })
    })
  </script>
{% endblock %}
