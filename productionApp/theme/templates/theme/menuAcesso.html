{% extends 'theme/base.html' %}
{% load static %}

{% block content %}
<div class="min-h-screen p-6 flex flex-col items-center justify-center">
    
    <div class="mb-12 text-center">
        <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">
            Gestão de Documentos
        </h1>
        <div class="h-1.5 w-20 bg-[#00b7ed] mx-auto mt-4 rounded-full"></div>
    </div>

    <div class="w-full max-w-md">

        <a href="{% url 'painel_acesso' %}" class="group">
            <div class="h-full bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-8 transition-all duration-300 hover:bg-white/20 hover:border-[#00b7ed] hover:-translate-y-1 shadow-xl flex flex-col items-center text-center">
                <div class="p-4 rounded-full bg-[#00b7ed]/20 text-[#00b7ed] mb-5 group-hover:bg-[#00b7ed] group-hover:text-black transition-all">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    <circle cx="12" cy="11" r="3" />
                </svg>
                </div>
                <span class="text-xl font-bold text-gray-800 uppercase tracking-wide">Grant/Remove access</span>
            </div>
        </a>

    </div>

    <div class="mt-16 text-center">
        <a href="javascript:history.back()" class="inline-flex items-center text-black/70 hover:text-black transition-colors font-medium">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Voltar ao Menu Principal
        </a>
    </div>
</div>
{% endblock %}
